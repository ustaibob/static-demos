<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAS OpenData — Agricultural Trade Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --border2: #21262d;
    --green: #3fb950;
    --green-dim: #1a4228;
    --green-glow: rgba(63,185,80,0.15);
    --amber: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --accent: #3fb950;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,17,23,0.95);
    backdrop-filter: blur(8px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .logo-badge {
    background: var(--green);
    color: #000;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.08em;
  }

  .header-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 5px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ─── LAYOUT ─── */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 52px);
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto;
    background: var(--surface);
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .nav-group { display: flex; flex-direction: column; gap: 4px; }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: all 0.15s;
  }

  .nav-btn:hover { background: var(--surface2); color: var(--text); }

  .nav-btn.active {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(63,185,80,0.3);
  }

  .nav-icon { font-size: 15px; opacity: 0.8; }

  .filter-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 4px;
    display: block;
    letter-spacing: 0.06em;
  }

  select, input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 12px;
    appearance: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  select:focus, input[type="number"]:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-glow);
  }

  .run-btn {
    width: 100%;
    background: var(--green);
    color: #000;
    border: none;
    padding: 10px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .run-btn:hover { background: #4ecb63; transform: translateY(-1px); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ─── MAIN CONTENT ─── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .toolbar {
    border-bottom: 1px solid var(--border2);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .toolbar-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .toolbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 10px;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .icon-btn:hover { background: var(--border); color: var(--text); }

  /* ─── CONTENT PANEL ─── */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* ─── EMPTY / LOADING STATES ─── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    gap: 16px;
    color: var(--text-dim);
  }

  .empty-icon { font-size: 48px; opacity: 0.4; }

  .empty-title {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-muted);
  }

  .empty-sub { font-size: 12px; text-align: center; max-width: 300px; }

  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    gap: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 13px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── DATA TABLE ─── */
  .data-table-wrap {
    overflow-x: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }

  thead {
    background: var(--surface2);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  th {
    padding: 10px 14px;
    text-align: left;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 9px 14px;
    color: var(--text);
    border-bottom: 1px solid var(--border2);
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .num-cell {
    color: var(--green);
    text-align: right;
    font-weight: 500;
  }

  .country-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 11px;
  }

  /* ─── CARDS (for summaries) ─── */
  .cards-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--green);
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }

  .stat-unit {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ─── ENDPOINTS INFO ─── */
  .endpoint-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
  }

  .endpoint-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .endpoint-card:hover {
    border-color: var(--green);
    background: var(--surface2);
  }

  .endpoint-tag {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(63,185,80,0.3);
    padding: 2px 7px;
    border-radius: 3px;
    margin-bottom: 10px;
    display: inline-block;
  }

  .endpoint-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
  }

  .endpoint-desc {
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .endpoint-url {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    word-break: break-all;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 6px 8px;
  }

  /* ─── ERROR ─── */
  .error-state {
    background: rgba(248,81,73,0.08);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 8px;
    padding: 16px 20px;
    color: var(--red);
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 16px;
  }

  /* ─── SEARCH INPUT ─── */
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px 9px 36px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 13px;
  }

  .search-input:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-glow);
  }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
  }

  /* ─── TABS ─── */
  .view-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .view-tab {
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    background: transparent;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }

  .view-tab.active {
    color: var(--green);
    border-bottom-color: var(--green);
  }

  .view-tab:hover:not(.active) { color: var(--text); }

  /* ─── PAGINATION ─── */
  .pagination {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .page-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--mono);
    font-size: 11px;
  }

  .page-btn:hover { border-color: var(--green); color: var(--green); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ─── BAR CHART (pure CSS/SVG) ─── */
  .chart-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .chart-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 140px 1fr 80px;
    align-items: center;
    gap: 10px;
  }

  .bar-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bar-track {
    background: var(--border2);
    border-radius: 2px;
    height: 18px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #2da44e, #3fb950);
    border-radius: 2px;
    transition: width 0.6s ease;
    position: relative;
  }

  .bar-val {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    text-align: left;
  }

  /* ─── API URL DISPLAY ─── */
  .api-url-bar {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
  }

  .api-url-bar span { color: var(--blue); word-break: break-all; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-badge">USDA</div>
    FAS OpenData Explorer
  </div>
  <div class="header-meta">
    <span><span class="status-dot"></span>API LIVE</span>
    <span>apps.fas.usda.gov/OpenData</span>
  </div>
</header>

<div class="app">
  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">
    <div>
      <div class="section-label">Datasets</div>
      <div class="nav-group">
        <button class="nav-btn active" onclick="setView('overview')" id="nav-overview">
          <span class="nav-icon">⬡</span> Overview
        </button>
        <button class="nav-btn" onclick="setView('commodities')" id="nav-commodities">
          <span class="nav-icon">🌾</span> Commodities
        </button>
        <button class="nav-btn" onclick="setView('countries')" id="nav-countries">
          <span class="nav-icon">🌐</span> Countries
        </button>
        <button class="nav-btn" onclick="setView('exports')" id="nav-exports">
          <span class="nav-icon">📦</span> Export Sales
        </button>
        <button class="nav-btn" onclick="setView('psd')" id="nav-psd">
          <span class="nav-icon">📊</span> PSD Data
        </button>
      </div>
    </div>

    <!-- Export query controls -->
    <div id="export-filters" style="display:none;">
      <div class="section-label">Query Parameters</div>
      <div class="filter-box">
        <div>
          <label class="field-label">COMMODITY CODE</label>
          <select id="commodity-select">
            <option value="">Loading...</option>
          </select>
        </div>
        <div>
          <label class="field-label">MARKET YEAR</label>
          <select id="year-select">
            <option value="2024">2024</option>
            <option value="2023" selected>2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
            <option value="2019">2019</option>
          </select>
        </div>
        <button class="run-btn" id="run-export-btn" onclick="runExportQuery()">
          ▶ RUN QUERY
        </button>
      </div>
    </div>

    <!-- PSD query controls -->
    <div id="psd-filters" style="display:none;">
      <div class="section-label">Query Parameters</div>
      <div class="filter-box">
        <div>
          <label class="field-label">COMMODITY CODE</label>
          <select id="psd-commodity-select">
            <option value="0440000">Corn (0440000)</option>
            <option value="2222000" selected>Soybeans (2222000)</option>
            <option value="0410000">Wheat (0410000)</option>
            <option value="0813100">Cotton (0813100)</option>
            <option value="0422110">Rice (0422110)</option>
          </select>
        </div>
        <div>
          <label class="field-label">COUNTRY CODE</label>
          <select id="psd-country-select">
            <option value="US" selected>United States</option>
            <option value="BR">Brazil</option>
            <option value="AR">Argentina</option>
            <option value="CN">China</option>
            <option value="AU">Australia</option>
          </select>
        </div>
        <button class="run-btn" onclick="runPsdQuery()">
          ▶ RUN QUERY
        </button>
      </div>
    </div>

    <div style="margin-top:auto; padding-top:12px; border-top: 1px solid var(--border2);">
      <div class="section-label" style="margin-bottom:6px;">Data Source</div>
      <div style="font-size:11px; color:var(--text-dim); line-height:1.6;">
        USDA Foreign Agricultural Service<br>
        Production, Supply & Distribution +<br>
        Export Sales Reporting (ESR)<br>
        <span style="color:var(--green)">No API key required</span>
      </div>
    </div>
  </aside>

  <!-- ─── MAIN ─── -->
  <main class="main">
    <div class="toolbar">
      <div class="toolbar-title" id="toolbar-title">
        ⬡ Overview
      </div>
      <div class="toolbar-actions">
        <span class="result-count" id="result-count" style="display:none;"></span>
        <button class="icon-btn" onclick="copyApiUrl()" id="copy-url-btn" style="display:none;">
          ⎘ Copy URL
        </button>
      </div>
    </div>

    <div class="content-area" id="content-area">
      <!-- Overview loaded by default -->
    </div>
  </main>
</div>

<script>
const BASE = 'https://apps.fas.usda.gov/OpenData/api';
let currentApiUrl = '';
let currentData = [];
let currentPage = 1;
const PAGE_SIZE = 50;
let searchQuery = '';

// ─── NAV ───
function setView(view) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + view)?.classList.add('active');
  document.getElementById('export-filters').style.display = view === 'exports' ? 'block' : 'none';
  document.getElementById('psd-filters').style.display = view === 'psd' ? 'block' : 'none';

  const titles = {
    overview: '⬡ Overview',
    commodities: '🌾 Commodities',
    countries: '🌐 Countries',
    exports: '📦 Export Sales',
    psd: '📊 Production, Supply & Distribution'
  };
  document.getElementById('toolbar-title').textContent = titles[view] || view;
  document.getElementById('result-count').style.display = 'none';
  document.getElementById('copy-url-btn').style.display = 'none';

  switch(view) {
    case 'overview': renderOverview(); break;
    case 'commodities': fetchCommodities(); break;
    case 'countries': fetchCountries(); break;
    case 'exports': renderExportReady(); break;
    case 'psd': renderPsdReady(); break;
  }
}

// ─── FETCH HELPERS ───
async function apiFetch(url) {
  currentApiUrl = url;
  document.getElementById('copy-url-btn').style.display = 'flex';
  const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  return res.json();
}

function showLoading() {
  document.getElementById('content-area').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div>Fetching from FAS OpenData...</div>
      <div style="font-size:11px;color:var(--text-dim)">apps.fas.usda.gov/OpenData</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('content-area').innerHTML = `
    <div class="error-state">⚠ API Error: ${msg}</div>
    <div class="empty-state">
      <div class="empty-icon">📡</div>
      <div class="empty-title">Could not reach FAS OpenData</div>
      <div class="empty-sub">The USDA API may be unavailable from this browser due to CORS restrictions. Try opening this file from a local server or use the endpoint URLs directly.</div>
    </div>`;
}

function copyApiUrl() {
  navigator.clipboard?.writeText(currentApiUrl);
  const btn = document.getElementById('copy-url-btn');
  btn.textContent = '✓ Copied';
  setTimeout(() => { btn.innerHTML = '⎘ Copy URL'; }, 1500);
}

// ─── COMMODITIES ───
async function fetchCommodities() {
  showLoading();
  try {
    const data = await apiFetch(`${BASE}/esr/commodities`);
    currentData = data;
    searchQuery = '';
    renderCommodityTable(data);
    document.getElementById('result-count').textContent = `${data.length} commodities`;
    document.getElementById('result-count').style.display = 'inline-flex';
  } catch(e) { showError(e.message); }
}

function renderCommodityTable(data) {
  const filtered = searchQuery
    ? data.filter(c => c.commodityName?.toLowerCase().includes(searchQuery) || String(c.commodityCode).includes(searchQuery))
    : data;

  document.getElementById('content-area').innerHTML = `
    <div class="api-url-bar">
      <span style="color:var(--text-dim)">GET</span>
      <span>${BASE}/esr/commodities</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" type="text" placeholder="Search commodities..." value="${searchQuery}"
        oninput="searchQuery=this.value.toLowerCase(); renderCommodityTable(currentData)">
    </div>
    <div class="data-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Commodity Name</th>
            <th>Group Name</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map(c => `
            <tr>
              <td><span class="country-pill">${c.commodityCode}</span></td>
              <td>${c.commodityName || '—'}</td>
              <td style="color:var(--text-muted)">${c.groupName || '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;
}

// ─── EXPORTS ───
function renderExportReady() {
  // Load commodities for the dropdown if needed
  if (document.getElementById('commodity-select').options[0]?.text === 'Loading...') {
    fetch(`${BASE}/esr/commodities`)
      .then(r => r.json())
      .then(data => {
        const sel = document.getElementById('commodity-select');
        sel.innerHTML = data.map(c =>
          `<option value="${c.commodityCode}" ${c.commodityCode == 107 ? 'selected' : ''}>${c.commodityCode} — ${c.commodityName}</option>`
        ).join('');
      }).catch(() => {
        document.getElementById('commodity-select').innerHTML =
          '<option value="107">107 — All Wheat</option><option value="2222000">2222000 — Soybeans</option>';
      });
  }

  document.getElementById('content-area').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📦</div>
      <div class="empty-title">Configure & Run Export Query</div>
      <div class="empty-sub">Select a commodity and market year in the sidebar, then click RUN QUERY.</div>
    </div>`;
}

async function runExportQuery() {
  const code = document.getElementById('commodity-select').value;
  const year = document.getElementById('year-select').value;
  if (!code) return;

  const btn = document.getElementById('run-export-btn');
  btn.disabled = true;
  btn.textContent = '⟳ Loading...';
  showLoading();

  try {
    const url = `${BASE}/esr/exports/commodityCode/${code}/allCountries/marketYear/${year}`;
    const data = await apiFetch(url);
    currentData = data;

    // Aggregate by country
    const byCountry = {};
    data.forEach(r => {
      const key = r.countryName || r.countryCode || 'Unknown';
      if (!byCountry[key]) byCountry[key] = 0;
      byCountry[key] += (r.weeklyExports || 0) + (r.accumulatedExports || 0);
    });

    const top10 = Object.entries(byCountry)
      .sort((a,b) => b[1]-a[1])
      .slice(0, 10);

    const max = top10[0]?.[1] || 1;

    const commodityName = document.getElementById('commodity-select').selectedOptions[0]?.text.split('—')[1]?.trim() || code;

    document.getElementById('content-area').innerHTML = `
      <div class="api-url-bar">
        <span style="color:var(--text-dim)">GET</span>
        <span>${url}</span>
      </div>
      <div class="cards-row">
        <div class="stat-card">
          <div class="stat-label">Records</div>
          <div class="stat-value">${data.length.toLocaleString()}</div>
          <div class="stat-unit">Weekly export entries</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Countries</div>
          <div class="stat-value">${Object.keys(byCountry).length}</div>
          <div class="stat-unit">Destination markets</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Commodity</div>
          <div class="stat-value" style="font-size:14px;">${commodityName}</div>
          <div class="stat-unit">Market Year ${year}</div>
        </div>
      </div>

      <div class="chart-area">
        <div class="chart-title">Top 10 Destinations by Export Volume (MT)</div>
        <div class="bar-chart">
          ${top10.map(([country, val]) => `
            <div class="bar-row">
              <div class="bar-label" title="${country}">${country}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${(val/max*100).toFixed(1)}%"></div>
              </div>
              <div class="bar-val">${formatNum(val)}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div style="font-family:var(--mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;">Raw Data (first 200 rows)</div>
      <div class="data-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Week Ending</th>
              <th>Country</th>
              <th>Weekly Exports (MT)</th>
              <th>Accumulated Exports</th>
              <th>Outstanding Sales</th>
            </tr>
          </thead>
          <tbody>
            ${data.slice(0,200).map(r => `
              <tr>
                <td style="color:var(--text-muted)">${r.weeklyExportDate?.split('T')[0] || '—'}</td>
                <td>${r.countryName || r.countryCode || '—'}</td>
                <td class="num-cell">${r.weeklyExports != null ? r.weeklyExports.toLocaleString() : '—'}</td>
                <td class="num-cell">${r.accumulatedExports != null ? r.accumulatedExports.toLocaleString() : '—'}</td>
                <td class="num-cell">${r.outstandingSales != null ? r.outstandingSales.toLocaleString() : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      ${data.length > 200 ? `<div style="font-family:var(--mono);font-size:11px;color:var(--text-dim);text-align:center;margin-top:12px;">${data.length - 200} more rows not shown</div>` : ''}
    `;

    document.getElementById('result-count').textContent = `${data.length} records`;
    document.getElementById('result-count').style.display = 'inline-flex';
  } catch(e) { showError(e.message); }

  btn.disabled = false;
  btn.textContent = '▶ RUN QUERY';
}

// ─── PSD ───
function renderPsdReady() {
  document.getElementById('content-area').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📊</div>
      <div class="empty-title">Configure PSD Query</div>
      <div class="empty-sub">Select a commodity and country in the sidebar, then click RUN QUERY.</div>
    </div>`;
}

async function runPsdQuery() {
  const code = document.getElementById('psd-commodity-select').value;
  const country = document.getElementById('psd-country-select').value;
  showLoading();

  try {
    const url = `${BASE}/psd/commodity/${code}/country/${country}`;
    const data = await apiFetch(url);
    currentData = data;

    const commodityName = document.getElementById('psd-commodity-select').selectedOptions[0]?.text.split('(')[0].trim();
    const countryName = document.getElementById('psd-country-select').selectedOptions[0]?.text;

    // Group by attribute
    const byAttr = {};
    data.forEach(r => {
      const key = r.attributeDescription || r.attributeId || 'Unknown';
      if (!byAttr[key]) byAttr[key] = [];
      byAttr[key].push(r);
    });

    document.getElementById('content-area').innerHTML = `
      <div class="api-url-bar">
        <span style="color:var(--text-dim)">GET</span>
        <span>${url}</span>
      </div>
      <div class="cards-row">
        <div class="stat-card">
          <div class="stat-label">Records</div>
          <div class="stat-value">${data.length.toLocaleString()}</div>
          <div class="stat-unit">Data points</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Commodity</div>
          <div class="stat-value" style="font-size:14px;">${commodityName}</div>
          <div class="stat-unit">${countryName}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Attributes</div>
          <div class="stat-value">${Object.keys(byAttr).length}</div>
          <div class="stat-unit">Distinct metrics</div>
        </div>
      </div>
      <div class="data-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Market Year</th>
              <th>Attribute</th>
              <th>Value</th>
              <th>Unit</th>
              <th>Month</th>
            </tr>
          </thead>
          <tbody>
            ${data.slice(0, 300).map(r => `
              <tr>
                <td style="color:var(--text-muted)">${r.marketYear || '—'}</td>
                <td>${r.attributeDescription || r.attributeId || '—'}</td>
                <td class="num-cell">${r.value != null ? Number(r.value).toLocaleString() : '—'}</td>
                <td style="color:var(--text-muted)">${r.unitDescription || '—'}</td>
                <td style="color:var(--text-muted)">${r.calendarYear || '—'}${r.month ? '-'+String(r.month).padStart(2,'0') : ''}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;

    document.getElementById('result-count').textContent = `${data.length} records`;
    document.getElementById('result-count').style.display = 'inline-flex';
  } catch(e) { showError(e.message); }
}

// ─── UTILS ───
function formatNum(n) {
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n/1_000).toFixed(0) + 'K';
  return n.toLocaleString();
}

// ─── INIT ───
renderOverview();
</script>
